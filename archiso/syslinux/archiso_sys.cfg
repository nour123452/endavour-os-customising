label arch64
menu label ^Boot Endeavour OS Privacy Edition (x86_64, BIOS)
linux ../arch/boot/x86_64/vmlinuz-linux-hardened
initrd ../arch/boot/x86_64/initramfs-linux-hardened.img
option mem=2048m
append archisobasedir=arch archisolabel=ENDEAVOUR_KDE cow_spacesize=10G quiet

label arch64safe
menu label ^Boot Endeavour OS Privacy Edition (x86_64, BIOS, fallback)
linux ../arch/boot/x86_64/vmlinuz-linux-hardened
initrd ../arch/boot/x86_64/initramfs-linux-hardened-fallback.img
append archisobasedir=arch archisolabel=ENDEAVOUR_KDE cow_spacesize=10G

label memtest
menu label ^Memory Test (memtest86+)
comboot ../arch/boot/memtest86+/memtest86+

label hdt
menu label ^Hardware Detection Tool (HDT)
com32 hdt.c32

label reboot
menu label ^Reboot
comm32 reboot.c32

label poweroff
menu label ^Power Off
comm32 poweroff.c32
