# Kernel Hardening Parameters
# Source: CIS Linux Benchmarks, Arch Security Wiki

# Hide kernel pointers
kernel.kptr_restrict = 2

# Restrict dmesg access
kernel.dmesg_restrict = 1

# Hide kernel module parameters
kernel.modules_disabled = 1

# Restrict unprivileged access to user namespaces
kernel.unprivileged_userns_clone = 0

# Restrict unprivileged eBPF
kernel.unprivileged_bpf_disabled = 1
kernel.bpf_stats_enabled = 0

# Restrict ptrace scope
kernel.yama.ptrace_scope = 3

# Restrict access to /proc/sys
kernel.perf_event_paranoid = 3

# Disable kexec
kernel.kexec_load_disabled = 1

# Restrict SysRq
kernel.sysrq = 0

# Enable ASLR
kernel.randomize_va_space = 2

# Restrict swap
vm.swappiness = 1

# Restrict core dumps
fs.suid_dumpable = 0

# Disable magic SysRq
kernel.sysrq = 0

# Restrict namespace access
user.max_user_namespaces = 10

# IP Forwarding (disabled for privacy)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Disable ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Disable ICMP echo
net.ipv4.icmp_echo_ignore_all = 0

# Enable SYN cookies
net.ipv4.tcp_syncookies = 1

# Disable rp_filter for privacy (can be configured per need)
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.rp_filter = 1

# Strict reverse path filtering
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
